# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

project_name: cloudip
version: 2

builds:
  - id: default
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - linux_386
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - "-X 'cloudip/cmd.Version={{.Version}}'"
    binary: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"
    main: ./
    no_unique_dist_dir: true

snapshot:
#  use snapshot for production build and archiving
  version_template: "{{.Major}}.{{.Minor}}.{{.Patch}}"

archives:
  - formats:
      - tar.gz
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE
      - README.md
      - docs/

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: jongwoo328
      name: homebrew-cloudip
    name: cloudip
    homepage: "https://github.com/jongwoo328/cloudip"
    description: "CLI tool that identifies which cloud provider owns a given IP address"
    license: "Apache-2.0"
